<div class="zoom-controls">
  <div class="zoom-pair">
    @if (queryRunning || visualiser?.isLayoutRunning) {
      <button class="zoom-button stop-button" (click)="stopLayout()" [disabled]="queryRunning" matTooltip="Stop simulation" [matTooltipShowDelay]="500">
        <i class="fa-light fa-stop"></i>
      </button>
    } @else {
      <button class="zoom-button" (click)="reLayout()" [disabled]="redrawCooldown" matTooltip="Redraw graph" [matTooltipShowDelay]="500" [matTooltipDisabled]="redrawCooldown">
        <i class="fa-light fa-arrows-rotate"></i>
      </button>
    }
    <div class="divider"></div>
    <button class="zoom-button"
            (click)="resetChangesClicked.emit()"
            [disabled]="!hasChanges"
            matTooltip="Reset changes"
            [matTooltipDisabled]="!hasChanges"
            [matTooltipShowDelay]="500">
      <i class="fa-light fa-rotate-left"></i>
    </button>
    <div class="divider"></div>
    <button class="zoom-button"
            (click)="collapse()"
            [disabled]="!canCollapse"
            matTooltip="Collapse nodes"
            [matTooltipDisabled]="!canCollapse"
            [matTooltipShowDelay]="500">
      <i class="fa-light fa-arrows-to-dot"></i>
    </button>
  </div>
  @let selection = visualiser?.interactionHandler?.selection$ | async;
  <button class="zoom-button reset-button"
          (click)="resetOrFocus()"
          [matTooltip]="selection ? 'Focus selection' : 'Reset view'"
          [matTooltipShowDelay]="500">
    <i class="fa-light fa-crosshairs"></i>
  </button>
  <div class="zoom-pair">
    <button class="zoom-button" (click)="zoomIn()" matTooltip="Zoom in" [matTooltipShowDelay]="500">
      <i class="fa-light fa-plus"></i>
    </button>
    <div class="divider"></div>
    <button class="zoom-button" (click)="zoomOut()" matTooltip="Zoom out" [matTooltipShowDelay]="500">
      <i class="fa-light fa-minus"></i>
    </button>
  </div>
</div>
